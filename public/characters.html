<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Characters | Ramayana War Archive</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <span class="logo-accent">⌘</span> Ramayana Archive
        </a>
        <ul class="nav-links">
            <li><a href="characters.html">Characters</a></li>
            <li><a href="duels.html">Duels</a></li>
            <li><a href="admin.html">Admin</a></li>
            <li><a href="#" id="darkModeToggle" style="font-size: 1.2rem; text-decoration: none;">🌙</a></li>
        </ul>
    </nav>

    <div class="container">
        <h1 class="section-title">Archived Characters</h1>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-input" placeholder="Search characters by name...">
        </div>

        <div id="loader" class="loader-container">
            <div class="loader"></div>
        </div>

        <div id="charactersGrid" class="grid" style="display: none;">
            <!-- Characters will be dynamically injected here -->
        </div>

        <div id="emptyState" class="empty-state" style="display: none;">
            <div class="empty-icon">🔍</div>
            <h3>No characters found</h3>
            <p>Try adjusting your search or add new characters in the Admin panel.</p>
        </div>
    </div>

    <!-- Scroll Buttons -->
    <button id="scrollTopBtn" class="scroll-btn scroll-top" title="Go to top">↑</button>
    <button id="scrollBottomBtn" class="scroll-btn scroll-bottom visible" title="Go to bottom">↓</button>

    <footer>
        <p>&copy; 2026 Ramayana War Archive. Documenting the ancient epic.</p>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/characters.js"></script>
</body>
</html>
